<!DOCTYPE html>
<html>
<head>
<title>Movie Database</title>

<style>
body {
    font-family: Arial;
    background:#111;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
}

input, select{
    padding:8px;
    margin:5px;
}

#autocomplete{
    background:#222;
    border:1px solid #555;
    max-width:400px;
}

.suggestion{
    padding:6px;
    cursor:pointer;
}

.suggestion:hover{
    background:#444;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #444;
    padding:8px;
    text-align:left;
}

th{
    background:#222;
}
</style>

</head>

<body>

<h1>Movie Database</h1>

<input id="search" placeholder="Search movies...">
<div id="autocomplete"></div>

<select id="sort">
<option value="name">Sort by Name</option>
<option value="sales">Sort by Sales</option>
<option value="year">Sort by Release Year</option>
<option value="rating">Sort by Rating</option>
</select>

<table>
<thead>
<tr>
<th>Nosaukums</th>
<th>Overview</th>
<th>Autors</th>
<th>Sales ($)</th>
<th>Age Rating</th>
<th>Release Year</th>
<th>Rating</th>
</tr>
</thead>

<tbody id="results"></tbody>

</table>

<script src="script.js"></script>

</body>
</html>
